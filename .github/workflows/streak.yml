name: Generate GitHub Streak SVG

on:
  schedule:
    - cron: "0 7 * * *"   # once daily at 7am UTC
  workflow_dispatch:        # manual trigger only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Streak SVG
        run: |
          curl -sf --retry 3 \
            "https://streak-stats.demolab.com?user=korryrdev&hide_border=true&background=0d1117&ring=F472B6&fire=818CF8&currStreakLabel=F472B6&sideLabels=e2e8f0&dates=94a3b8&border_radius=10" \
            -o streak.svg
          grep -q '<svg' streak.svg || (echo "ERROR: streak response is not SVG" && cat streak.svg && exit 1)
          # Fix near-black number color to be visible on dark background
          sed -i "s/fill='#151515'/fill='#e2e8f0'/g" streak.svg
          sed -i 's/fill="#151515"/fill="#e2e8f0"/g' streak.svg

      - name: Commit streak SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streak.svg
          git diff --cached --quiet || git commit -m "chore: refresh streak SVG [skip ci]"
          git push
